<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCar Tuning Tool</title>
<style>
/* ============================================================
   CSS Custom Properties — Deep Blue + iOS Polish
   ============================================================ */
:root {
  /* Background layers — deep blue spectrum */
  --bg-primary: #0e1525;
  --bg-secondary: #162038;
  --bg-tertiary: #1e2d4a;
  --bg-elevated: #253758;
  --bg-card: linear-gradient(145deg, #192844, #14203a);

  /* Glass fills */
  --fill-primary: rgba(255,255,255,0.08);
  --fill-secondary: rgba(255,255,255,0.06);
  --fill-tertiary: rgba(255,255,255,0.04);
  --fill-quaternary: rgba(255,255,255,0.025);

  /* Separators */
  --separator: rgba(255,255,255,0.08);

  /* Text */
  --text-primary: #eef2ff;
  --text-secondary: #94a3c0;
  --text-tertiary: #556b8a;
  --text-quaternary: #384d6d;

  /* iOS System Colors */
  --ios-blue: #0a84ff;
  --ios-green: #30d158;
  --ios-orange: #ff9f0a;
  --ios-red: #ff453a;
  --ios-teal: #64d2ff;
  --ios-indigo: #5e5ce6;
  --ios-purple: #bf5af2;
  --ios-pink: #ff375f;

  /* Accent */
  --accent: var(--ios-blue);
  --accent-dim: rgba(10,132,255,0.15);

  /* Typography — system stack */
  --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', ui-monospace, 'Cascadia Code', 'Menlo', 'Consolas', monospace;

  /* Sizing */
  --header-h: 54px;
  --metrics-h: 130px;
  --console-h: 110px;
  --radius: 12px;
  --radius-lg: 14px;

  /* Shared easing */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* Thin scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* ============================================================
   Layout Grid
   ============================================================ */
#app {
  display: grid;
  grid-template-rows: var(--header-h) var(--metrics-h) 1fr var(--console-h);
  grid-template-columns: 1fr 350px;
  height: 100vh;
  gap: 0;
  background: var(--bg-primary);
}

/* ============================================================
   Header — Frosted Bar
   ============================================================ */
#header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 24px;
  background: linear-gradient(180deg, rgba(22,32,56,0.95), rgba(14,21,37,0.9));
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 10;
}

#header .logo {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.5px;
  background: linear-gradient(135deg, #64b5f6, #7c4dff, #e040fb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#header .spacer { flex: 1; }

.status-group {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-quaternary);
  transition: all 0.4s var(--ease-smooth);
}
.status-dot.connected {
  background: var(--ios-green);
  box-shadow: 0 0 6px rgba(48,209,88,0.5), 0 0 16px rgba(48,209,88,0.2);
  animation: pulse-glow 2s ease-in-out infinite;
}
.status-dot.warning {
  background: var(--ios-orange);
  box-shadow: 0 0 8px rgba(255,159,10,0.5);
}
.status-dot.error { background: var(--ios-red); }

@keyframes pulse-glow {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.2); }
}

.badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-secondary);
}

.badge-accent {
  background: rgba(10,132,255,0.12);
  border-color: rgba(10,132,255,0.2);
  color: var(--ios-blue);
}

/* ============================================================
   Metrics Bar — Glowing Cards
   ============================================================ */
#metrics-bar {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 12px 24px;
  background: var(--bg-primary);
}

.metric-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  position: relative;
  overflow: hidden;
  transition: all 0.35s var(--ease-smooth);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.metric-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.35s;
  pointer-events: none;
}
.metric-card:hover {
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.metric-card:hover::before { opacity: 1; }

/* Per-card ambient glow on hover — set by JS via accent-bar color */
.metric-card:nth-child(1)::before { background: radial-gradient(ellipse at 50% 0%, rgba(94,92,230,0.08) 0%, transparent 70%); }
.metric-card:nth-child(2)::before { background: radial-gradient(ellipse at 50% 0%, rgba(48,209,88,0.08) 0%, transparent 70%); }
.metric-card:nth-child(3)::before { background: radial-gradient(ellipse at 50% 0%, rgba(255,69,58,0.08) 0%, transparent 70%); }
.metric-card:nth-child(4)::before { background: radial-gradient(ellipse at 50% 0%, rgba(191,90,242,0.08) 0%, transparent 70%); }

.metric-card .accent-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.metric-card .mc-label {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.metric-card .mc-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 6px;
}

.metric-card .mc-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -1px;
  transition: color 0.2s, text-shadow 0.2s;
  min-width: 80px;
  font-feature-settings: 'tnum' 1;
}

.metric-card .mc-delta {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
}
.mc-delta.up { color: var(--ios-green); }
.mc-delta.down { color: var(--ios-red); }

.metric-card .mc-spark {
  position: absolute;
  bottom: 8px; right: 10px;
  width: 80px; height: 28px;
  opacity: 0.6;
}

.mc-value.flash {
  animation: val-flash 0.4s var(--ease-smooth);
}
@keyframes val-flash {
  0% { color: #fff; text-shadow: 0 0 16px rgba(100,180,255,0.7); }
  100% { color: var(--text-primary); text-shadow: none; }
}

/* Card border glow pulse on value change */
.metric-card.glow-pulse {
  animation: card-glow 0.6s var(--ease-smooth);
}
@keyframes card-glow {
  0% { border-color: var(--glow-color, rgba(255,255,255,0.2)); box-shadow: 0 0 16px 2px var(--glow-color, rgba(100,180,255,0.2)), 0 2px 8px rgba(0,0,0,0.3); }
  100% { border-color: rgba(255,255,255,0.06); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
}

/* ============================================================
   Chart Area — Ambient Glow Background
   ============================================================ */
#chart-area {
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
  border-right: 1px solid rgba(255,255,255,0.04);
  overflow: hidden;
  position: relative;
}
/* Subtle radial glow behind chart */
#chart-area::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 60%; height: 60%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse, rgba(94,92,230,0.04) 0%, rgba(10,132,255,0.02) 40%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#chart-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  flex-shrink: 0;
  background: rgba(22,32,56,0.6);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

/* Channel pills */
.channel-chip {
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.25s var(--ease-smooth);
  user-select: none;
  letter-spacing: 0.2px;
}
.channel-chip.active {
  opacity: 1;
  border-color: currentColor;
  box-shadow: 0 0 8px currentColor;
}
.channel-chip.inactive {
  opacity: 0.25;
  background: transparent !important;
  border-color: transparent;
}
.channel-chip:hover { opacity: 0.9; transform: scale(1.05); }
.channel-chip:active { transform: scale(0.95); }

.chart-btn-group {
  display: flex;
  gap: 0;
  margin-left: auto;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  overflow: hidden;
}

.chart-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.2s var(--ease-smooth);
}
.chart-btn:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text-primary);
}
.chart-btn:active { background: rgba(255,255,255,0.1); }

.zoom-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: 6px;
  font-weight: 500;
}

#chart-container {
  flex: 1;
  position: relative;
  min-height: 0;
  z-index: 1;
}

#mainChart {
  display: block;
  width: 100%;
  height: 100%;
}

/* Tooltip — frosted */
#chart-tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(20,30,50,0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--text-primary);
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 20;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#chart-tooltip.visible { opacity: 1; }

/* Minimap */
#minimap-area {
  height: 36px;
  flex-shrink: 0;
  position: relative;
  background: rgba(14,21,37,0.8);
  border-top: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  z-index: 1;
}
#minimapCanvas {
  display: block;
  width: 100%;
  height: 100%;
}
.minimap-viewport {
  position: absolute;
  top: 2px; bottom: 2px;
  background: rgba(10,132,255,0.1);
  border: 1px solid rgba(10,132,255,0.3);
  border-radius: 4px;
  pointer-events: none;
}

/* ============================================================
   Right Panel
   ============================================================ */
#right-panel {
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, var(--bg-primary) 0%, rgba(16,24,42,1) 100%);
  overflow: hidden;
}

/* Segmented Control */
.tab-bar {
  display: flex;
  padding: 10px 12px 6px;
  flex-shrink: 0;
}

.tab-bar-inner {
  display: flex;
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 2px;
}

.tab-btn {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 0;
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.3s var(--ease-smooth);
  flex: 1;
  text-align: center;
  border-radius: 8px;
  position: relative;
  z-index: 1;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
  color: var(--text-primary);
  background: var(--bg-tertiary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
}

.tab-content {
  flex: 1;
  overflow-y: auto;
  padding: 2px 12px 12px;
  display: none;
}
.tab-content.active { display: block; }

/* ---- Section title with accent dot ---- */
.detail-section-title {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-tertiary);
  margin: 18px 0 8px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.detail-section-title::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--ios-blue);
  box-shadow: 0 0 6px rgba(10,132,255,0.4);
  flex-shrink: 0;
}
.detail-section-title:first-child { margin-top: 8px; }

/* ---- Hero metric cards (for Attitude) ---- */
.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.hero-card {
  background: linear-gradient(145deg, var(--bg-secondary), rgba(22,32,56,0.8));
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 12px 14px;
  position: relative;
  overflow: hidden;
  transition: all 0.25s var(--ease-smooth);
}
.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 0 2px 2px 0;
}
.hero-card:hover {
  border-color: rgba(255,255,255,0.10);
  background: linear-gradient(145deg, var(--bg-tertiary), var(--bg-secondary));
}
.hero-card .hero-label {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.hero-card .hero-value {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
  font-feature-settings: 'tnum' 1;
  transition: color 0.15s;
}
.hero-card .hero-unit {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-quaternary);
  margin-left: 2px;
  font-weight: 500;
}

/* Hero card color variants */
.hero-card[data-color="blue"]::before { background: var(--ios-blue); }
.hero-card[data-color="blue"] .hero-value { color: var(--ios-teal); }
.hero-card[data-color="green"]::before { background: var(--ios-green); }
.hero-card[data-color="green"] .hero-value { color: var(--ios-green); }
.hero-card[data-color="purple"]::before { background: var(--ios-purple); }
.hero-card[data-color="purple"] .hero-value { color: var(--ios-purple); }
.hero-card[data-color="indigo"]::before { background: var(--ios-indigo); }
.hero-card[data-color="indigo"] .hero-value { color: var(--ios-indigo); }

/* ---- Grouped list card ---- */
.detail-grid {
  display: flex;
  flex-direction: column;
  background: var(--bg-secondary);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius);
  overflow: hidden;
}

.detail-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 14px;
  background: transparent;
  transition: all 0.2s;
  position: relative;
}
.detail-item:not(:last-child)::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 14px; right: 14px;
  height: 1px;
  background: rgba(255,255,255,0.035);
}
.detail-item:hover {
  background: rgba(255,255,255,0.025);
}

.detail-item .di-label {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

.detail-item .di-value {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  font-feature-settings: 'tnum' 1;
  text-align: right;
  min-width: 80px;
}

/* ---- Status badge (pill) ---- */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}
.status-badge.ok {
  background: rgba(48,209,88,0.12);
  color: var(--ios-green);
  border: 1px solid rgba(48,209,88,0.2);
}
.status-badge.warn {
  background: rgba(255,159,10,0.12);
  color: var(--ios-orange);
  border: 1px solid rgba(255,159,10,0.2);
}
.status-badge.off {
  background: rgba(255,255,255,0.04);
  color: var(--text-tertiary);
  border: 1px solid rgba(255,255,255,0.06);
}

/* ---- Highlighted values ---- */
.detail-item.highlight .di-value {
  color: var(--ios-blue);
  text-shadow: 0 0 10px rgba(10,132,255,0.2);
}
.detail-item.status-ok .di-value {
  color: var(--ios-green);
  text-shadow: 0 0 10px rgba(48,209,88,0.15);
}
.detail-item.status-warn .di-value {
  color: var(--ios-orange);
  text-shadow: 0 0 10px rgba(255,159,10,0.15);
}

/* ---- Compact 2-col grid for extended data ---- */
.detail-grid-compact {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 0;
  background: var(--bg-secondary);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius);
  overflow: hidden;
}
.detail-grid-compact .detail-item {
  padding: 7px 12px;
}
.detail-grid-compact .detail-item .di-label {
  font-size: 10.5px;
  color: var(--text-tertiary);
}
.detail-grid-compact .detail-item .di-value {
  font-size: 11px;
  min-width: 50px;
}
.detail-grid-compact .detail-item:not(:last-child)::after {
  left: 12px; right: 12px;
}
/* Add right border on left-column items */
.detail-grid-compact .detail-item:nth-child(odd) {
  border-right: 1px solid rgba(255,255,255,0.035);
}

/* ============================================================
   Command Area
   ============================================================ */
#cmd-area {
  flex-shrink: 0;
  padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,0.04);
  background: var(--bg-primary);
}

.cmd-quick {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}

/* Tinted buttons */
.cmd-btn {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 10px;
  background: rgba(10,132,255,0.12);
  border: 1px solid rgba(10,132,255,0.15);
  color: var(--ios-blue);
  cursor: pointer;
  transition: all 0.2s var(--ease-smooth);
}
.cmd-btn:hover {
  background: rgba(10,132,255,0.22);
  border-color: rgba(10,132,255,0.3);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(10,132,255,0.15);
}
.cmd-btn:active {
  transform: scale(0.96);
}

.cmd-btn.sim-start {
  background: rgba(48,209,88,0.12);
  border-color: rgba(48,209,88,0.15);
  color: var(--ios-green);
}
.cmd-btn.sim-start:hover {
  background: rgba(48,209,88,0.22);
  border-color: rgba(48,209,88,0.3);
  box-shadow: 0 4px 12px rgba(48,209,88,0.12);
}
.cmd-btn.sim-stop {
  background: rgba(255,69,58,0.12);
  border-color: rgba(255,69,58,0.15);
  color: var(--ios-red);
}
.cmd-btn.sim-stop:hover {
  background: rgba(255,69,58,0.22);
  border-color: rgba(255,69,58,0.3);
  box-shadow: 0 4px 12px rgba(255,69,58,0.12);
}

.cmd-input-row {
  display: flex;
  gap: 8px;
}

#cmdInput {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 9px 14px;
  background: var(--bg-secondary);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s;
}
#cmdInput:focus {
  border-color: rgba(10,132,255,0.4);
  box-shadow: 0 0 0 3px rgba(10,132,255,0.1);
}
#cmdInput::placeholder { color: var(--text-quaternary); }

#cmdSend {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 20px;
  border-radius: 10px;
  background: linear-gradient(135deg, #0a84ff, #5e5ce6);
  border: none;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s var(--ease-smooth);
  box-shadow: 0 2px 10px rgba(10,132,255,0.25);
}
#cmdSend:hover {
  box-shadow: 0 4px 20px rgba(10,132,255,0.35);
  transform: translateY(-1px);
}
#cmdSend:active {
  transform: scale(0.96);
}

/* ============================================================
   Console
   ============================================================ */
#console {
  grid-column: 1 / -1;
  background: rgba(10,14,24,0.95);
  border-top: 1px solid rgba(255,255,255,0.04);
  padding: 8px 24px;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.7;
  color: var(--text-secondary);
}

.console-line {
  opacity: 0;
  animation: fade-in 0.25s var(--ease-smooth) forwards;
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(3px); }
  to { opacity: 1; transform: translateY(0); }
}

.console-line .cl-time {
  color: var(--text-quaternary);
  margin-right: 10px;
}
.console-line .cl-tag {
  font-weight: 600;
  margin-right: 8px;
}
.cl-tag.info  { color: var(--ios-blue); }
.cl-tag.ok    { color: var(--ios-green); }
.cl-tag.warn  { color: var(--ios-orange); }
.cl-tag.error { color: var(--ios-red); }
.cl-tag.cmd   { color: var(--ios-purple); }

/* ============================================================
   Reveal Animation
   ============================================================ */
.reveal {
  opacity: 0;
  transform: translateY(14px) scale(0.97);
  animation: reveal 0.5s var(--ease-smooth) forwards;
}
@keyframes reveal {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 1100px) {
  #app { grid-template-columns: 1fr 290px; }
  .metric-card .mc-value { font-size: 22px; }
}
</style>
</head>
<body>

<div id="app">
  <!-- ===================== HEADER ===================== -->
  <header id="header">
    <div class="logo">SmartCar Tuning</div>
    <div class="spacer"></div>
    <div class="status-group">
      <div class="status-dot" id="connDot"></div>
      <span class="badge" id="connLabel">Disconnected</span>
      <span class="badge badge-accent" id="clientCount">0 clients</span>
    </div>
  </header>

  <!-- ===================== METRICS BAR ===================== -->
  <div id="metrics-bar">
    <!-- Cards injected by JS -->
  </div>

  <!-- ===================== CHART AREA ===================== -->
  <div id="chart-area">
    <div id="chart-toolbar">
      <!-- Channel chips injected by JS -->
      <div class="chart-btn-group">
        <button class="chart-btn" id="btnZoomIn" title="Zoom in">+</button>
        <button class="chart-btn" id="btnZoomOut" title="Zoom out">&minus;</button>
        <button class="chart-btn" id="btnZoomReset" title="Reset zoom">Reset</button>
      </div>
      <span class="zoom-label" id="zoomLabel">1.0x</span>
    </div>
    <div id="chart-container">
      <canvas id="mainChart"></canvas>
      <div id="chart-tooltip"></div>
    </div>
    <div id="minimap-area">
      <canvas id="minimapCanvas"></canvas>
      <div class="minimap-viewport" id="minimapViewport"></div>
    </div>
  </div>

  <!-- ===================== RIGHT PANEL ===================== -->
  <div id="right-panel">
    <div class="tab-bar">
      <div class="tab-bar-inner">
        <button class="tab-btn active" data-tab="telemetry">Telemetry</button>
        <button class="tab-btn" data-tab="commands">Commands</button>
      </div>
    </div>
    <div class="tab-content active" id="tab-telemetry">
      <!-- Injected by JS -->
    </div>
    <div class="tab-content" id="tab-commands">
      <!-- Injected by JS -->
    </div>
    <div id="cmd-area">
      <div class="cmd-quick">
        <button class="cmd-btn" data-cmd="GET PID">GET PID</button>
        <button class="cmd-btn" data-cmd="SAVE PID">SAVE PID</button>
        <button class="cmd-btn sim-start" data-cmd="SET TELEMETRY ON">Start</button>
        <button class="cmd-btn sim-stop" data-cmd="SET TELEMETRY OFF">Stop</button>
      </div>
      <div class="cmd-input-row">
        <input type="text" id="cmdInput" placeholder="Type a command..." autocomplete="off">
        <button id="cmdSend">Send</button>
      </div>
    </div>
  </div>

  <!-- ===================== CONSOLE ===================== -->
  <div id="console"></div>
</div>

<script>
/* ================================================================
   DATA LAYER
   ================================================================ */
const API_BASE = `${window.location.protocol}//${window.location.host}`;
const POLL_INTERVAL = 16;  // ~60fps polling
const MAX_DATA_POINTS = 10000;
const MAX_CONSOLE_LINES = 200;

// Channel definitions — defaults, overridden by /config at startup
let CHANNELS = [
  { key: 'gx',   label: 'GX',   color: '#5e5ce6', visible: true },
  { key: 'gy',   label: 'GY',   color: '#30d158', visible: true },
  { key: 'gz',   label: 'GZ',   color: '#ff453a', visible: true },
  { key: 'gxyz', label: 'GXYZ', color: '#bf5af2', visible: true },
];

// Primary metric keys (top cards, first 4 channels)
let PRIMARY_METRICS = ['gx', 'gy', 'gz', 'gxyz'];

// Detail metrics grouped — Telemetry tab
let DETAIL_GROUPS = [
  {
    title: 'Attitude',
    fields: [
      { key: 'roll', label: 'Roll' }, { key: 'pitch', label: 'Pitch' },
      { key: 'yaw', label: 'Yaw' }, { key: 'anorm', label: 'A-Norm' },
    ]
  },
  {
    title: 'Bias Calibration',
    fields: [
      { key: 'bias_ok', label: 'Bias OK' }, { key: 'bias_cal', label: 'Bias Cal' },
      { key: 'bias_n', label: 'Bias N' }, { key: 'bias_t', label: 'Bias T' },
    ]
  },
  {
    title: 'Extended Sensors',
    fields: [
      { key: 'gcx', label: 'GCX' }, { key: 'gcy', label: 'GCY' },
      { key: 'gcz', label: 'GCZ' }, { key: 'gbx', label: 'GBX' },
      { key: 'gby', label: 'GBY' }, { key: 'gbz', label: 'GBZ' },
      { key: 'bias_flash', label: 'Flash' },
      { key: 'q0', label: 'Q0' }, { key: 'q1', label: 'Q1' },
      { key: 'q2', label: 'Q2' }, { key: 'q3', label: 'Q3' },
      { key: 'ax', label: 'AX' }, { key: 'ay', label: 'AY' },
      { key: 'az', label: 'AZ' }, { key: 'anorm', label: 'A-Norm' },
      { key: 'att_upd', label: 'Att Update' },
    ]
  },
];

// Data stores
const dataStore = {
  history: [],
  sparklines: {},
  prevValues: {},
  connected: false,
  serverInfo: { mode: '--', port: '--', connections: 0, running: false },
  lastCmdResult: {},
};

// Chart view state
const view = {
  viewStart: 0,
  viewCount: 200,
  baseCount: 200,
  autoFollow: true,
  isDragging: false,
  dragStartX: 0,
  dragStartView: 0,
  // Smooth Y-axis state
  smoothYMin: null,
  smoothYMax: null,
};

// Minimap drag state
const mmDrag = { active: false, startX: 0, startView: 0 };

/* ================================================================
   LOAD CONFIG FROM SERVER
   ================================================================ */
async function loadConfig() {
  try {
    const resp = await fetch(`${API_BASE}/config`);
    if (!resp.ok) return;
    const cfg = await resp.json();

    // Override channels
    if (cfg.plot_channels && cfg.plot_channels.length) {
      CHANNELS = cfg.plot_channels.map(ch => ({
        key: ch.key,
        label: ch.label || ch.key.toUpperCase(),
        color: ch.color,
        visible: ch.visible !== false,
      }));
    }

    // Override primary metrics
    if (cfg.primary_metrics && cfg.primary_metrics.length) {
      PRIMARY_METRICS = cfg.primary_metrics.map(m => m.key);
    }

    // Override detail groups from detail + extended metrics
    if (cfg.detail_metrics || cfg.extended_metrics) {
      DETAIL_GROUPS = [];
      if (cfg.detail_metrics && cfg.detail_metrics.length) {
        DETAIL_GROUPS.push({
          title: 'Detail',
          fields: cfg.detail_metrics.map(m => ({ key: m.key, label: m.label })),
        });
      }
      if (cfg.extended_metrics && cfg.extended_metrics.length) {
        DETAIL_GROUPS.push({
          title: 'Extended',
          fields: cfg.extended_metrics.map(m => ({ key: m.key, label: m.label })),
        });
      }
    }

    // Update page title
    if (cfg.app_title) {
      document.title = cfg.app_title;
    }
  } catch (e) {
    consoleLog('warn', 'Config', 'Using built-in defaults');
  }
}

/* ================================================================
   UI INITIALIZATION
   ================================================================ */
function initUI() {
  buildMetricCards();
  buildChannelChips();
  buildDetailPanel();
  bindTabs();
  bindCommands();
  bindChartEvents();
  bindMinimapEvents();
  bindKeyboardShortcuts();
  consoleLog('info', 'Dashboard', 'Initializing...');
}

function buildMetricCards() {
  const bar = document.getElementById('metrics-bar');
  bar.innerHTML = '';
  PRIMARY_METRICS.forEach((key, i) => {
    const ch = CHANNELS[i];
    const card = document.createElement('div');
    card.className = 'metric-card reveal';
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <div class="accent-bar" style="background: ${ch.color}"></div>
      <div class="mc-label">${ch.label}</div>
      <div class="mc-row">
        <span class="mc-value" id="mv-${key}">--</span>
        <span class="mc-delta" id="md-${key}"></span>
      </div>
      <svg class="mc-spark" id="spark-${key}" viewBox="0 0 80 28" preserveAspectRatio="none">
        <defs>
          <linearGradient id="sg-${key}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${ch.color}" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="${ch.color}" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path id="spark-fill-${key}" fill="url(#sg-${key})" d=""/>
        <path id="spark-line-${key}" fill="none" stroke="${ch.color}" stroke-width="1.5" d=""/>
      </svg>
    `;
    bar.appendChild(card);
    dataStore.sparklines[key] = [];
  });
}

function buildChannelChips() {
  const toolbar = document.getElementById('chart-toolbar');
  const btnGroup = toolbar.querySelector('.chart-btn-group');
  CHANNELS.forEach((ch, i) => {
    const chip = document.createElement('span');
    chip.className = `channel-chip ${ch.visible ? 'active' : 'inactive'}`;
    chip.style.color = ch.color;
    chip.style.background = ch.visible ? hexToRGBA(ch.color, 0.15) : 'transparent';
    chip.textContent = ch.label;
    chip.dataset.idx = i;
    chip.addEventListener('click', () => {
      ch.visible = !ch.visible;
      chip.className = `channel-chip ${ch.visible ? 'active' : 'inactive'}`;
      chip.style.background = ch.visible ? hexToRGBA(ch.color, 0.15) : 'transparent';
      requestChartRender();
    });
    toolbar.insertBefore(chip, btnGroup);
  });
}

function buildDetailPanel() {
  const container = document.getElementById('tab-telemetry');
  container.innerHTML = '';

  // Hero card config for Attitude
  const heroColors = { roll: 'blue', pitch: 'green', yaw: 'purple', anorm: 'indigo' };
  const heroUnits = { roll: '\u00B0', pitch: '\u00B0', yaw: '\u00B0', anorm: '' };
  // Badge keys for Bias section
  const badgeKeys = new Set(['bias_ok', 'bias_cal']);

  DETAIL_GROUPS.forEach((group, gi) => {
    const title = document.createElement('div');
    title.className = 'detail-section-title';
    title.textContent = group.title;
    container.appendChild(title);

    // Attitude -> hero cards
    if (gi === 0) {
      const heroGrid = document.createElement('div');
      heroGrid.className = 'hero-grid';
      group.fields.forEach(f => {
        const card = document.createElement('div');
        card.className = 'hero-card';
        card.dataset.color = heroColors[f.key] || 'blue';
        card.id = 'di-' + f.key;
        card.innerHTML = `
          <div class="hero-label">${f.label}</div>
          <span class="hero-value" id="dv-${f.key}">--</span><span class="hero-unit">${heroUnits[f.key] || ''}</span>
        `;
        heroGrid.appendChild(card);
      });
      container.appendChild(heroGrid);
      return;
    }

    // Extended -> compact 2-col grid
    if (gi === 2) {
      const grid = document.createElement('div');
      grid.className = 'detail-grid-compact';
      group.fields.forEach(f => {
        const item = document.createElement('div');
        item.className = 'detail-item';
        item.id = 'di-' + f.key;
        item.innerHTML = `
          <span class="di-label">${f.label}</span>
          <span class="di-value" id="dv-${f.key}">--</span>
        `;
        grid.appendChild(item);
      });
      container.appendChild(grid);
      return;
    }

    // Bias -> normal list with badge support
    const grid = document.createElement('div');
    grid.className = 'detail-grid';
    group.fields.forEach(f => {
      const item = document.createElement('div');
      item.className = 'detail-item';
      item.id = 'di-' + f.key;
      if (badgeKeys.has(f.key)) {
        item.innerHTML = `
          <span class="di-label">${f.label}</span>
          <span class="status-badge off" id="dv-${f.key}">--</span>
        `;
      } else {
        item.innerHTML = `
          <span class="di-label">${f.label}</span>
          <span class="di-value" id="dv-${f.key}">--</span>
        `;
      }
      grid.appendChild(item);
    });
    container.appendChild(grid);
  });
}

function bindTabs() {
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });
}

function bindCommands() {
  document.querySelectorAll('.cmd-btn[data-cmd]').forEach(btn => {
    btn.addEventListener('click', () => sendCommand(btn.dataset.cmd));
  });

  const input = document.getElementById('cmdInput');
  const sendBtn = document.getElementById('cmdSend');
  sendBtn.addEventListener('click', () => {
    const cmd = input.value.trim();
    if (cmd) { sendCommand(cmd); input.value = ''; }
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const cmd = input.value.trim();
      if (cmd) { sendCommand(cmd); input.value = ''; }
    }
  });
}

/* ================================================================
   CHART INTERACTION EVENTS
   ================================================================ */
function bindChartEvents() {
  const canvas = document.getElementById('mainChart');

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mouseXRatio = (e.clientX - rect.left) / rect.width;
    const zoomFactor = e.deltaY > 0 ? 1.15 : 0.87;
    const newCount = Math.max(20, Math.min(dataStore.history.length, Math.round(view.viewCount * zoomFactor)));
    const delta = newCount - view.viewCount;
    const leftShift = Math.round(delta * mouseXRatio);
    view.viewStart = Math.max(0, view.viewStart - leftShift);
    view.viewCount = newCount;
    view.smoothYMin = null; view.smoothYMax = null;
    clampView();
    view.autoFollow = (view.viewStart + view.viewCount >= dataStore.history.length);
    updateZoomLabel();
    requestChartRender();
  }, { passive: false });

  canvas.addEventListener('mousedown', e => {
    if (e.button === 0) {
      view.isDragging = true;
      view.dragStartX = e.clientX;
      view.dragStartView = view.viewStart;
      canvas.style.cursor = 'grabbing';
    }
  });
  window.addEventListener('mousemove', e => {
    if (view.isDragging) {
      const rect = document.getElementById('mainChart').getBoundingClientRect();
      const pxPerPoint = rect.width / view.viewCount;
      const dx = e.clientX - view.dragStartX;
      const pointsDelta = Math.round(dx / pxPerPoint);
      view.viewStart = Math.max(0, Math.min(dataStore.history.length - view.viewCount, view.dragStartView - pointsDelta));
      view.autoFollow = (view.viewStart + view.viewCount >= dataStore.history.length);
      updateZoomLabel();
      requestChartRender();
    }
    updateTooltip(e);
  });
  window.addEventListener('mouseup', () => {
    if (view.isDragging) {
      view.isDragging = false;
      document.getElementById('mainChart').style.cursor = 'crosshair';
    }
  });

  canvas.addEventListener('dblclick', () => {
    view.viewCount = view.baseCount;
    view.autoFollow = true;
    view.smoothYMin = null; view.smoothYMax = null;
    clampView();
    updateZoomLabel();
    requestChartRender();
  });

  canvas.addEventListener('mouseleave', () => {
    document.getElementById('chart-tooltip').classList.remove('visible');
  });

  document.getElementById('btnZoomIn').addEventListener('click', () => {
    view.viewCount = Math.max(20, Math.round(view.viewCount * 0.75));
    clampView();
    view.autoFollow = (view.viewStart + view.viewCount >= dataStore.history.length);
    updateZoomLabel();
    requestChartRender();
  });
  document.getElementById('btnZoomOut').addEventListener('click', () => {
    view.viewCount = Math.min(dataStore.history.length || view.baseCount, Math.round(view.viewCount * 1.35));
    clampView();
    view.autoFollow = (view.viewStart + view.viewCount >= dataStore.history.length);
    updateZoomLabel();
    requestChartRender();
  });
  document.getElementById('btnZoomReset').addEventListener('click', () => {
    view.viewCount = view.baseCount;
    view.autoFollow = true;
    view.smoothYMin = null; view.smoothYMax = null;
    clampView();
    updateZoomLabel();
    requestChartRender();
  });

  canvas.style.cursor = 'crosshair';
}

function bindKeyboardShortcuts() {
  window.addEventListener('keydown', e => {
    // Don't capture when typing in input fields
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    const step = Math.max(1, Math.round(view.viewCount * 0.1));

    switch (e.key) {
      case ' ':  // Space: toggle auto-follow (pause/resume)
        e.preventDefault();
        view.autoFollow = !view.autoFollow;
        if (view.autoFollow) {
          view.viewStart = Math.max(0, dataStore.history.length - view.viewCount);
          consoleLog('info', 'Chart', 'Auto-follow ON');
        } else {
          consoleLog('info', 'Chart', 'Auto-follow OFF (paused)');
        }
        requestChartRender();
        break;

      case 'ArrowLeft':  // Move viewport left
        e.preventDefault();
        view.autoFollow = false;
        view.viewStart = Math.max(0, view.viewStart - step);
        updateZoomLabel();
        requestChartRender();
        break;

      case 'ArrowRight':  // Move viewport right
        e.preventDefault();
        view.viewStart = Math.min(
          Math.max(0, dataStore.history.length - view.viewCount),
          view.viewStart + step
        );
        view.autoFollow = (view.viewStart + view.viewCount >= dataStore.history.length);
        updateZoomLabel();
        requestChartRender();
        break;

      case '+':
      case '=':  // Zoom in
        e.preventDefault();
        view.viewCount = Math.max(20, Math.round(view.viewCount * 0.75));
        view.smoothYMin = null; view.smoothYMax = null;
        clampView();
        view.autoFollow = (view.viewStart + view.viewCount >= dataStore.history.length);
        updateZoomLabel();
        requestChartRender();
        break;

      case '-':
      case '_':  // Zoom out
        e.preventDefault();
        view.viewCount = Math.min(dataStore.history.length || view.baseCount, Math.round(view.viewCount * 1.35));
        view.smoothYMin = null; view.smoothYMax = null;
        clampView();
        view.autoFollow = (view.viewStart + view.viewCount >= dataStore.history.length);
        updateZoomLabel();
        requestChartRender();
        break;

      case 'Home':  // Jump to start
        e.preventDefault();
        view.autoFollow = false;
        view.viewStart = 0;
        view.smoothYMin = null; view.smoothYMax = null;
        updateZoomLabel();
        requestChartRender();
        break;

      case 'End':  // Jump to latest
        e.preventDefault();
        view.autoFollow = true;
        view.viewStart = Math.max(0, dataStore.history.length - view.viewCount);
        view.smoothYMin = null; view.smoothYMax = null;
        updateZoomLabel();
        requestChartRender();
        break;

      case 'r':
      case 'R':  // Reset zoom
        view.viewCount = view.baseCount;
        view.autoFollow = true;
        view.smoothYMin = null; view.smoothYMax = null;
        clampView();
        updateZoomLabel();
        requestChartRender();
        break;
    }
  });
}

function bindMinimapEvents() {
  const mm = document.getElementById('minimap-area');
  mm.addEventListener('mousedown', e => {
    mmDrag.active = true;
    const rect = mm.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const total = dataStore.history.length || 1;
    view.viewStart = Math.round(ratio * total - view.viewCount / 2);
    clampView();
    view.autoFollow = (view.viewStart + view.viewCount >= total);
    mmDrag.startX = e.clientX;
    mmDrag.startView = view.viewStart;
    updateZoomLabel();
    requestChartRender();
  });
  window.addEventListener('mousemove', e => {
    if (!mmDrag.active) return;
    const rect = mm.getBoundingClientRect();
    const dx = e.clientX - mmDrag.startX;
    const total = dataStore.history.length || 1;
    const pointsDelta = Math.round((dx / rect.width) * total);
    view.viewStart = Math.max(0, Math.min(total - view.viewCount, mmDrag.startView + pointsDelta));
    view.autoFollow = (view.viewStart + view.viewCount >= total);
    updateZoomLabel();
    requestChartRender();
  });
  window.addEventListener('mouseup', () => { mmDrag.active = false; });
}

function clampView() {
  const total = dataStore.history.length;
  if (total === 0) return;
  view.viewCount = Math.max(20, Math.min(total, view.viewCount));
  if (view.autoFollow) {
    view.viewStart = Math.max(0, total - view.viewCount);
  } else {
    view.viewStart = Math.max(0, Math.min(total - view.viewCount, view.viewStart));
  }
}

function updateZoomLabel() {
  const zoom = view.baseCount / view.viewCount;
  document.getElementById('zoomLabel').textContent =
    zoom === 1 ? '1.0x' : zoom.toFixed(1) + 'x';
}

/* ================================================================
   CROSSHAIR + TOOLTIP
   ================================================================ */
// Persistent crosshair state so renderChart can draw it
const crosshair = { active: false, mouseX: 0, mouseY: 0, dataIdx: -1 };

function updateTooltip(e) {
  const canvas = document.getElementById('mainChart');
  const rect = canvas.getBoundingClientRect();
  const tooltip = document.getElementById('chart-tooltip');

  if (e.clientX < rect.left || e.clientX > rect.right ||
      e.clientY < rect.top || e.clientY > rect.bottom ||
      view.isDragging || dataStore.history.length === 0) {
    tooltip.classList.remove('visible');
    if (crosshair.active) { crosshair.active = false; requestChartRender(); }
    return;
  }

  const localX = e.clientX - rect.left;
  const localY = e.clientY - rect.top;
  const xRatio = localX / rect.width;
  const idx = Math.round(view.viewStart + xRatio * (view.viewCount - 1));
  const clamped = Math.max(0, Math.min(dataStore.history.length - 1, idx));
  const point = dataStore.history[clamped];
  if (!point) { tooltip.classList.remove('visible'); crosshair.active = false; return; }

  // Update crosshair state
  crosshair.active = true;
  crosshair.mouseX = localX;
  crosshair.mouseY = localY;
  crosshair.dataIdx = clamped;
  requestChartRender();

  // Build tooltip with colored dots
  let html = `<div style="color:var(--text-tertiary);margin-bottom:3px;font-size:10px;font-weight:500;">#${clamped}</div>`;
  CHANNELS.forEach(ch => {
    if (!ch.visible) return;
    const val = point[ch.key];
    html += `<div style="display:flex;align-items:center;gap:6px;padding:1.5px 0;">` +
      `<span style="width:6px;height:6px;border-radius:50%;background:${ch.color};box-shadow:0 0 4px ${ch.color};flex-shrink:0;"></span>` +
      `<span style="color:var(--text-secondary);font-size:11px;">${ch.label}</span>` +
      `<span style="color:${ch.color};font-weight:700;margin-left:auto;font-size:11px;">${val != null ? Number(val).toFixed(3) : '--'}</span>` +
      `</div>`;
  });
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');

  let tx = localX + 18;
  let ty = localY - 10;
  if (tx + tooltip.offsetWidth > rect.width - 8) tx = localX - tooltip.offsetWidth - 14;
  if (ty < 8) ty = 8;
  if (ty + tooltip.offsetHeight > rect.height - 8) ty = rect.height - tooltip.offsetHeight - 8;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

// Draw crosshair overlay on top of chart (called from renderChart)
function drawCrosshair(ctx, W, H, pad, cw, ch_h, yMin, yMax, xOf, yOf, slice, start) {
  if (!crosshair.active || crosshair.dataIdx < 0) return;

  const localIdx = crosshair.dataIdx - start;
  if (localIdx < 0 || localIdx >= slice.length) return;
  const point = slice[localIdx];
  if (!point) return;

  const cx = xOf(localIdx);

  // Vertical crosshair line
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(cx, pad.top);
  ctx.lineTo(cx, pad.top + ch_h);
  ctx.stroke();
  ctx.setLineDash([]);

  // Horizontal line at mouse Y
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(pad.left, crosshair.mouseY);
  ctx.lineTo(pad.left + cw, crosshair.mouseY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Highlighted dots on each channel at this data point
  CHANNELS.forEach(c => {
    if (!c.visible) return;
    const v = parseFloat(point[c.key]);
    if (!isFinite(v)) return;
    const cy = yOf(v);

    // Outer glow ring
    ctx.save();
    ctx.shadowColor = c.color;
    ctx.shadowBlur = 8;
    ctx.strokeStyle = c.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Inner dot
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

/* ================================================================
   CHART RENDERING (Canvas)
   ================================================================ */
let chartRAF = null;
function requestChartRender() {
  if (chartRAF) return;
  chartRAF = requestAnimationFrame(() => {
    chartRAF = null;
    renderChart();
    renderMinimap();
    updateMinimapViewport();
  });
}

function renderChart() {
  const canvas = document.getElementById('mainChart');
  const container = document.getElementById('chart-container');
  const dpr = window.devicePixelRatio || 1;
  const W = container.clientWidth;
  const H = container.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const data = dataStore.history;
  if (data.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = '15px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for telemetry data...', W / 2, H / 2);
    return;
  }

  const pad = { top: 16, right: 16, bottom: 24, left: 56 };
  const cw = W - pad.left - pad.right;
  const ch_h = H - pad.top - pad.bottom;

  const start = view.viewStart;
  const count = Math.min(view.viewCount, data.length - start);
  const slice = data.slice(start, start + count);

  // Compute target Y range from visible data
  let targetMin = Infinity, targetMax = -Infinity;
  CHANNELS.forEach(c => {
    if (!c.visible) return;
    slice.forEach(p => {
      const v = parseFloat(p[c.key]);
      if (isFinite(v)) {
        if (v < targetMin) targetMin = v;
        if (v > targetMax) targetMax = v;
      }
    });
  });
  if (!isFinite(targetMin)) { targetMin = -1; targetMax = 1; }
  const yPadding = (targetMax - targetMin) * 0.12 || 1;
  targetMin -= yPadding;
  targetMax += yPadding;

  // Smooth Y-axis: expand fast, shrink slow
  if (view.smoothYMin === null || view.smoothYMax === null) {
    view.smoothYMin = targetMin;
    view.smoothYMax = targetMax;
  } else {
    // Expand immediately to never clip data; shrink with lerp
    const shrinkRate = 0.04;  // slow shrink (lower = smoother)
    const expandRate = 0.5;   // fast expand to keep data visible
    view.smoothYMin = targetMin < view.smoothYMin
      ? view.smoothYMin + (targetMin - view.smoothYMin) * expandRate
      : view.smoothYMin + (targetMin - view.smoothYMin) * shrinkRate;
    view.smoothYMax = targetMax > view.smoothYMax
      ? view.smoothYMax + (targetMax - view.smoothYMax) * expandRate
      : view.smoothYMax + (targetMax - view.smoothYMax) * shrinkRate;
  }

  const yMin = view.smoothYMin;
  const yMax = view.smoothYMax;

  const xOf = i => pad.left + (i / (count - 1 || 1)) * cw;
  const yOf = v => pad.top + (1 - (v - yMin) / (yMax - yMin)) * ch_h;

  drawGrid(ctx, W, H, pad, cw, ch_h, yMin, yMax, xOf, yOf, count);

  CHANNELS.forEach(c => {
    if (!c.visible) return;
    const pts = [];
    slice.forEach((p, i) => {
      const v = parseFloat(p[c.key]);
      if (isFinite(v)) pts.push({ x: xOf(i), y: yOf(v) });
    });
    if (pts.length < 2) return;

    // Gradient fill — richer
    const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch_h);
    grad.addColorStop(0, hexToRGBA(c.color, 0.22));
    grad.addColorStop(0.5, hexToRGBA(c.color, 0.06));
    grad.addColorStop(1, hexToRGBA(c.color, 0));
    ctx.beginPath();
    drawSmoothLine(ctx, pts);
    ctx.lineTo(pts[pts.length - 1].x, pad.top + ch_h);
    ctx.lineTo(pts[0].x, pad.top + ch_h);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Outer glow (wide, soft)
    ctx.save();
    ctx.shadowColor = c.color;
    ctx.shadowBlur = 16;
    ctx.lineWidth = 4;
    ctx.strokeStyle = hexToRGBA(c.color, 0.15);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    drawSmoothLine(ctx, pts);
    ctx.stroke();
    ctx.restore();

    // Inner glow (medium)
    ctx.save();
    ctx.shadowColor = c.color;
    ctx.shadowBlur = 6;
    ctx.lineWidth = 3;
    ctx.strokeStyle = hexToRGBA(c.color, 0.4);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    drawSmoothLine(ctx, pts);
    ctx.stroke();
    ctx.restore();

    // Main line — crisp
    ctx.lineWidth = 2.2;
    ctx.strokeStyle = c.color;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    drawSmoothLine(ctx, pts);
    ctx.stroke();

    // Endpoint dot — layered glow
    const last = pts[pts.length - 1];
    // Outer halo
    ctx.save();
    ctx.shadowColor = c.color;
    ctx.shadowBlur = 20;
    ctx.fillStyle = hexToRGBA(c.color, 0.25);
    ctx.beginPath();
    ctx.arc(last.x, last.y, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Core dot
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(last.x, last.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // White center
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(last.x, last.y, 1.3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Crosshair overlay (drawn last, on top of everything)
  drawCrosshair(ctx, W, H, pad, cw, ch_h, yMin, yMax, xOf, yOf, slice, start);
}

function drawSmoothLine(ctx, pts) {
  if (pts.length < 2) return;
  ctx.moveTo(pts[0].x, pts[0].y);
  if (pts.length === 2) {
    ctx.lineTo(pts[1].x, pts[1].y);
    return;
  }
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(pts.length - 1, i + 2)];
    const tension = 0.3;
    const cp1x = p1.x + (p2.x - p0.x) * tension;
    const cp1y = p1.y + (p2.y - p0.y) * tension;
    const cp2x = p2.x - (p3.x - p1.x) * tension;
    const cp2y = p2.y - (p3.y - p1.y) * tension;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
  }
}

function drawGrid(ctx, W, H, pad, cw, ch_h, yMin, yMax, xOf, yOf, count) {
  ctx.save();

  // Subtle vertical lines (time divisions)
  const xTicks = Math.min(count, 8);
  const xStep = Math.max(1, Math.floor(count / xTicks));
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let i = xStep; i < count; i += xStep) {
    const x = xOf(i);
    ctx.beginPath();
    ctx.moveTo(x, pad.top);
    ctx.lineTo(x, pad.top + ch_h);
    ctx.stroke();
  }

  // Horizontal grid + axis labels
  const yTicks = niceScale(yMin, yMax, 6);
  yTicks.forEach(v => {
    const y = yOf(v);
    if (y < pad.top || y > pad.top + ch_h) return;
    // Grid line
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + cw, y);
    ctx.stroke();
    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '10px ui-monospace, "SF Mono", Menlo, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(formatAxis(v), pad.left - 8, y + 3.5);
  });

  // Zero line highlight
  if (yMin <= 0 && yMax >= 0) {
    const zeroY = yOf(0);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(pad.left, zeroY);
    ctx.lineTo(pad.left + cw, zeroY);
    ctx.stroke();
  } else {
    // Center dashed line
    const centerY = yOf((yMin + yMax) / 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(pad.left, centerY);
    ctx.lineTo(pad.left + cw, centerY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Left axis line
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top + ch_h);
  ctx.stroke();

  ctx.restore();
}

/* ================================================================
   MINIMAP
   ================================================================ */
function renderMinimap() {
  const canvas = document.getElementById('minimapCanvas');
  const container = document.getElementById('minimap-area');
  const dpr = window.devicePixelRatio || 1;
  const W = container.clientWidth;
  const H = container.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const data = dataStore.history;
  if (data.length < 2) return;

  const pad = 2;
  const mw = W - pad * 2;
  const mh = H - pad * 2;

  let yMin = Infinity, yMax = -Infinity;
  CHANNELS.forEach(c => {
    if (!c.visible) return;
    data.forEach(p => {
      const v = parseFloat(p[c.key]);
      if (isFinite(v)) {
        if (v < yMin) yMin = v;
        if (v > yMax) yMax = v;
      }
    });
  });
  if (!isFinite(yMin)) return;
  const yPadding = (yMax - yMin) * 0.05 || 1;
  yMin -= yPadding;
  yMax += yPadding;

  const maxPts = Math.min(data.length, 400);
  const step = Math.max(1, Math.floor(data.length / maxPts));

  CHANNELS.forEach(c => {
    if (!c.visible) return;
    ctx.strokeStyle = hexToRGBA(c.color, 0.5);
    ctx.lineWidth = 1;
    ctx.beginPath();
    let first = true;
    for (let i = 0; i < data.length; i += step) {
      const v = parseFloat(data[i][c.key]);
      if (!isFinite(v)) continue;
      const x = pad + (i / (data.length - 1)) * mw;
      const y = pad + (1 - (v - yMin) / (yMax - yMin)) * mh;
      if (first) { ctx.moveTo(x, y); first = false; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
}

function updateMinimapViewport() {
  const vp = document.getElementById('minimapViewport');
  const total = dataStore.history.length || 1;
  const container = document.getElementById('minimap-area');
  const W = container.clientWidth;
  const left = (view.viewStart / total) * W;
  const width = Math.max(8, (view.viewCount / total) * W);
  vp.style.left = left + 'px';
  vp.style.width = width + 'px';
}

/* ================================================================
   UI UPDATE
   ================================================================ */
function updateMetricCards(latest) {
  PRIMARY_METRICS.forEach(key => {
    const valEl = document.getElementById(`mv-${key}`);
    const deltaEl = document.getElementById(`md-${key}`);
    if (!valEl) return;

    const v = parseFloat(latest[key]);
    if (!isFinite(v)) return;
    const formatted = v.toFixed(2);
    const prev = dataStore.prevValues[key];

    if (prev != null && Math.abs(v - prev) > 0.05) {
      valEl.classList.remove('flash');
      void valEl.offsetWidth;
      valEl.classList.add('flash');
      // Card border glow
      const card = valEl.closest('.metric-card');
      if (card) {
        const ch = CHANNELS[PRIMARY_METRICS.indexOf(key)];
        card.style.setProperty('--glow-color', ch ? hexToRGBA(ch.color, 0.35) : 'rgba(100,180,255,0.25)');
        card.classList.remove('glow-pulse');
        void card.offsetWidth;
        card.classList.add('glow-pulse');
      }
    }

    valEl.textContent = formatted;

    if (prev != null) {
      const delta = v - prev;
      const arrow = delta >= 0 ? '\u25B2' : '\u25BC';
      deltaEl.textContent = `${arrow}${Math.abs(delta).toFixed(2)}`;
      deltaEl.className = `mc-delta ${delta >= 0 ? 'up' : 'down'}`;
    }

    const spark = dataStore.sparklines[key];
    spark.push(v);
    if (spark.length > 20) spark.shift();
    updateSparkline(key, spark);

    dataStore.prevValues[key] = v;
  });
}

function updateSparkline(key, values) {
  if (values.length < 2) return;
  const w = 80, h = 28;
  let min = Infinity, max = -Infinity;
  values.forEach(v => { if (v < min) min = v; if (v > max) max = v; });
  const range = max - min || 1;
  const pad = range * 0.1;
  const yMin = min - pad, yMax = max + pad;

  const pts = values.map((v, i) => ({
    x: (i / (values.length - 1)) * w,
    y: h - ((v - yMin) / (yMax - yMin)) * h
  }));

  let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(pts.length - 1, i + 2)];
    const t = 0.3;
    const cp1x = p1.x + (p2.x - p0.x) * t;
    const cp1y = p1.y + (p2.y - p0.y) * t;
    const cp2x = p2.x - (p3.x - p1.x) * t;
    const cp2y = p2.y - (p3.y - p1.y) * t;
    d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }

  const linePath = document.getElementById(`spark-line-${key}`);
  if (linePath) linePath.setAttribute('d', d);

  const fillPath = document.getElementById(`spark-fill-${key}`);
  if (fillPath) {
    fillPath.setAttribute('d', d + ` L${pts[pts.length-1].x.toFixed(1)},${h} L${pts[0].x.toFixed(1)},${h} Z`);
  }
}

function updateDetailPanel(latest) {
  const badgeKeys = new Set(['bias_ok', 'bias_cal']);
  DETAIL_GROUPS.forEach(group => {
    group.fields.forEach(f => {
      const el = document.getElementById(`dv-${f.key}`);
      if (!el) return;
      const v = latest[f.key];
      if (v == null) return;

      if (badgeKeys.has(f.key)) {
        // Status badge rendering
        const num = Number(v);
        if (f.key === 'bias_ok') {
          el.textContent = num === 1 ? 'OK' : 'WAIT';
          el.className = 'status-badge ' + (num === 1 ? 'ok' : 'warn');
        } else if (f.key === 'bias_cal') {
          el.textContent = num === 1 ? 'ACTIVE' : 'IDLE';
          el.className = 'status-badge ' + (num === 1 ? 'warn' : 'off');
        }
      } else {
        el.textContent = isNaN(v) ? v : Number(v).toFixed(3);
      }
    });
  });
}

function updateHeader(info) {
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  const clients = document.getElementById('clientCount');

  if (dataStore.connected) {
    if (info.running) {
      dot.className = 'status-dot connected';
      label.textContent = `${info.mode || 'server'} :${info.port || 9898}`;
    } else {
      dot.className = 'status-dot warning';
      label.textContent = 'Idle';
    }
  } else {
    dot.className = 'status-dot error';
    label.textContent = 'Disconnected';
  }
  clients.textContent = `${info.connections || 0} client${info.connections !== 1 ? 's' : ''}`;
}

/* ================================================================
   CONSOLE
   ================================================================ */
function consoleLog(type, tag, msg) {
  const con = document.getElementById('console');
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  const line = document.createElement('div');
  line.className = 'console-line';
  line.innerHTML = `<span class="cl-time">${ts}</span><span class="cl-tag ${type}">[${tag}]</span>${escapeHtml(msg)}`;
  con.appendChild(line);

  while (con.children.length > MAX_CONSOLE_LINES) {
    con.removeChild(con.firstChild);
  }
  con.scrollTop = con.scrollHeight;
}

/* ================================================================
   NETWORK / POLLING
   ================================================================ */
let pollTimer = null;
let statusTimer = null;

async function pollLatest() {
  try {
    const resp = await fetch(`${API_BASE}/latest`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    if (!dataStore.connected) {
      dataStore.connected = true;
      consoleLog('ok', 'Net', 'Connected to backend API');
    }

    dataStore.history.push(data);
    if (dataStore.history.length > MAX_DATA_POINTS) {
      const trimCount = dataStore.history.length - MAX_DATA_POINTS;
      dataStore.history.splice(0, trimCount);
      view.viewStart = Math.max(0, view.viewStart - trimCount);
    }

    if (view.autoFollow) {
      view.viewStart = Math.max(0, dataStore.history.length - view.viewCount);
    }

    updateMetricCards(data);
    updateDetailPanel(data);
    requestChartRender();

    if (data.cmd_result && Object.keys(data.cmd_result).length > 0) {
      const cr = data.cmd_result;
      const crKey = JSON.stringify(cr);
      if (crKey !== JSON.stringify(dataStore.lastCmdResult) && Object.keys(cr).length > 0) {
        dataStore.lastCmdResult = cr;
        const display = Object.entries(cr).map(([k, v]) => `${k}=${v}`).join(' ');
        if (display) consoleLog('ok', 'Result', display);
      }
    }
  } catch (err) {
    if (dataStore.connected) {
      dataStore.connected = false;
      consoleLog('error', 'Net', 'Connection lost: ' + err.message);
      updateHeader(dataStore.serverInfo);
    }
  }
}

async function pollStatus() {
  try {
    const resp = await fetch(`${API_BASE}/status`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const info = await resp.json();
    dataStore.serverInfo = info;
    dataStore.connected = true;
    updateHeader(info);
  } catch (err) {
    // Handled in pollLatest
  }
}

async function sendCommand(cmd) {
  consoleLog('cmd', 'Cmd', `Sending: ${cmd}`);
  try {
    const resp = await fetch(`${API_BASE}/command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd }),
    });
    const result = await resp.json();
    if (result.error) {
      consoleLog('error', 'Cmd', result.error);
    } else {
      consoleLog('ok', 'Cmd', `Sent: ${result.command}`);
    }
  } catch (err) {
    consoleLog('error', 'Cmd', 'Failed: ' + err.message);
  }
}

async function loadHistory() {
  try {
    const resp = await fetch(`${API_BASE}/history`);
    if (!resp.ok) return;
    let hist = await resp.json();
    if (Array.isArray(hist) && hist.length > 0) {
      dataStore.history = hist;
      clampView();
      consoleLog('info', 'Data', `Loaded ${hist.length} historical points`);
      requestChartRender();
    }
  } catch (err) {
    // Ignore
  }
}

/* ================================================================
   UTILITY HELPERS
   ================================================================ */
function hexToRGBA(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatAxis(v) {
  const abs = Math.abs(v);
  if (abs >= 1000) return v.toFixed(0);
  if (abs >= 10) return v.toFixed(1);
  if (abs >= 1) return v.toFixed(2);
  return v.toFixed(3);
}

function niceScale(min, max, targetTicks) {
  const range = max - min;
  if (range === 0) return [min];
  const roughStep = range / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(roughStep)));
  const residual = roughStep / mag;
  let step;
  if (residual <= 1.5) step = mag;
  else if (residual <= 3) step = 2 * mag;
  else if (residual <= 7) step = 5 * mag;
  else step = 10 * mag;

  const ticks = [];
  const start = Math.ceil(min / step) * step;
  for (let v = start; v <= max; v += step) {
    ticks.push(parseFloat(v.toFixed(10)));
  }
  return ticks;
}
